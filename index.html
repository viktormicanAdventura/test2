 <!DOCTYPE html>

<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Hádanka</title>
<style>

body {

    font-family: Arial;
    max-width: 700px;
    margin: 80px auto;
    text-align: center;
    background: #f5f5f5;
}

#box {

    background: white;

    padding: 30px;

    border-radius: 10px;

}

input, button {
    padding: 10px;
    font-size: 16px;
    margin-top: 15px;
    width: 80%;
}

#error {

    color: red;
    margin-top: 10px;

}

</style>

</head>

<body>

<div id="box">

<h2>🔐 Vyřeš hádanku</h2>

<p>

Jsem něco, co roste, ale nikdy nežije.  

Nemám plíce, ale potřebuji vzduch.  

Když mě vezmeš pryč, všechno zmizí.  

Co jsem?

</p>

<input type="text" id="answer" placeholder="Odpověď" onkeypress="enter(event)">

<br>

<button onclick="check()">Odeslat</button>

<div id="error"></div>

</div>

<script>

function check() {

    let a = document.getElementById("answer").value.toLowerCase().trim();

    if (a === "oheň") {

        window.location.replace("https://raw.githubusercontent.com/viktormicanAdventura/test2/main/Mapa-1.png");

    } else {

        document.getElementById("error").innerText = "Špatně, zkus to znovu.";

    }

}


function enter(e){

    if(e.key === "Enter") check();

}

</script>


</body>

</html>
